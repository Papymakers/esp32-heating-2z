; =============================================================================
; platformio.ini — ESP32 Heating Controller v4.0-2Z
; Variante 2 zones + TM1637 (ErriezTM1637)
; ESP32-C6-DevKitC-1-N8 (8MB Flash)
; =============================================================================

[env:esp32-c6-devkitc-1]
platform = https://github.com/tasmota/platform-espressif32/releases/download/2024.06.10/platform-espressif32.zip
board = esp32-c6-devkitc-1
framework = arduino

board_build.partitions = partitions.csv

monitor_speed = 115200
monitor_filters = esp32_exception_decoder

upload_speed  = 921600
upload_port   = /dev/ttyUSB0

build_flags =
    -DARDUINO_ESP32_C6_DEVKITC_1
    -DCORE_DEBUG_LEVEL=0
    -I include

lib_deps =
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^7.0.0
    erriez/ErriezTM1637
